<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xero Bank Balances</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    color: #1a1a18;
  }

  header {
    background: #1a1a18;
    color: #f5f4f0;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 13px;
    color: #888780;
  }

  #last-updated {
    font-size: 12px;
    color: #888780;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* AUTH SCREEN */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
  }

  .auth-card {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 16px;
    padding: 2.5rem 3rem;
    max-width: 440px;
    width: 100%;
  }

  .auth-card h2 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .auth-card p {
    font-size: 14px;
    color: #5f5e5a;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .field-group {
    text-align: left;
    margin-bottom: 1rem;
  }

  .field-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #5f5e5a;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .field-group input {
    width: 100%;
    padding: 10px 14px;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    font-size: 14px;
    background: #f5f4f0;
    color: #1a1a18;
    font-family: 'SF Mono', 'Consolas', monospace;
    transition: border-color 0.15s;
  }

  .field-group input:focus {
    outline: none;
    border-color: #888780;
    background: #fff;
  }

  .btn-connect {
    width: 100%;
    padding: 12px;
    background: #1a1a18;
    color: #f5f4f0;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s;
  }

  .btn-connect:hover { opacity: 0.85; }
  .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }

  .help-link {
    font-size: 12px;
    color: #888780;
    margin-top: 1.25rem;
    display: block;
    text-align: center;
  }

  .help-link a { color: #5f5e5a; text-decoration: underline; }

  /* ERROR */
  .error-banner {
    background: #fcebeb;
    border: 0.5px solid #f09595;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #a32d2d;
    margin-bottom: 1rem;
    display: none;
  }

  /* DASHBOARD */
  #dashboard-screen { display: none; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .total-card {
    background: #1a1a18;
    color: #f5f4f0;
    border-radius: 16px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
  }

  .total-card .label {
    font-size: 12px;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
  }

  .total-card .amount {
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.03em;
  }

  .total-card .sub {
    font-size: 13px;
    color: #888780;
    margin-top: 4px;
  }

  .orgs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .org-card {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 16px;
    overflow: hidden;
  }

  .org-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 0.5px solid #e8e7e1;
  }

  .org-name {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .org-total {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: #1a1a18;
  }

  .org-total.negative { color: #a32d2d; }

  .accounts-list {
    padding: 0.5rem 0;
  }

  .account-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 1.25rem;
    font-size: 13px;
    border-bottom: 0.5px solid #f0efe9;
  }

  .account-row:last-child { border-bottom: none; }

  .account-name {
    color: #5f5e5a;
    flex: 1;
    margin-right: 1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .account-balance {
    font-weight: 500;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .account-balance.negative { color: #a32d2d; }

  .loading-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 1rem 1.25rem;
    font-size: 13px;
    color: #888780;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #d3d1c7;
    border-top-color: #5f5e5a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-refresh {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #1a1a18;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-refresh:hover { background: #f5f4f0; }

  .btn-signout {
    background: none;
    border: none;
    font-size: 13px;
    color: #888780;
    cursor: pointer;
    padding: 8px;
    text-decoration: underline;
  }

  .currency-tag {
    font-size: 11px;
    color: #888780;
    background: #f5f4f0;
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #63a522;
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.error { background: #e24b4a; }

  /* OAUTH CALLBACK */
  #callback-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
    gap: 1rem;
  }

  #callback-screen p {
    font-size: 15px;
    color: #5f5e5a;
  }
</style>
</head>
<body>

<header>
  <h1>Xero Bank Balances</h1>
  <span id="last-updated"></span>
</header>

<div class="container">

  <!-- SETUP SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>Connect to Xero</h2>
      <p>Enter your Xero OAuth app credentials to get started. These are stored only in your browser.</p>

      <div id="error-msg" class="error-banner"></div>

      <div class="field-group">
        <label>Client ID</label>
        <input type="text" id="client-id" placeholder="Paste your Xero Client ID" autocomplete="off" />
      </div>

      <div class="field-group">
        <label>Client Secret</label>
        <input type="password" id="client-secret" placeholder="Paste your Xero Client Secret" autocomplete="off" />
      </div>

      <button class="btn-connect" id="btn-auth" onclick="startAuth()">Connect to Xero →</button>

      <span class="help-link">
        No credentials yet? <a href="https://developer.xero.com/app/manage" target="_blank">Create a free Xero app</a> — takes 5 mins.<br>Set the redirect URI to: <strong id="redirect-uri-display"></strong>
      </span>
    </div>
  </div>

  <!-- CALLBACK / LOADING -->
  <div id="callback-screen">
    <div class="spinner" style="width:24px;height:24px;border-width:3px;"></div>
    <p id="callback-msg">Connecting to Xero…</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen">
    <div class="top-bar">
      <div>
        <div style="font-size:12px;color:#888780;margin-bottom:2px;">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Live data</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn-refresh" onclick="loadBalances()">
          <span style="font-size:16px;">↻</span> Refresh
        </button>
        <button class="btn-signout" onclick="signOut()">Sign out</button>
      </div>
    </div>

    <div class="total-card">
      <div class="label">Total cash across all entities</div>
      <div class="amount" id="grand-total">—</div>
      <div class="sub" id="entity-count">Loading…</div>
    </div>

    <div class="orgs-grid" id="orgs-grid"></div>
  </div>

</div>

<script>
const REDIRECT_URI = window.location.origin + window.location.pathname;
const STORAGE_KEY = 'xero_dash_creds';

document.getElementById('redirect-uri-display').textContent = REDIRECT_URI;

function fmt(amount, currency) {
  const sym = currency === 'GBP' ? '£' : currency === 'USD' ? '$' : currency === 'EUR' ? '€' : (currency + ' ');
  const abs = Math.abs(amount);
  const str = sym + abs.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return amount < 0 ? '−' + str : str;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function saveCredentials(clientId, clientSecret) {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ clientId, clientSecret }));
}

function getCredentials() {
  try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch { return null; }
}

function startAuth() {
  const clientId = document.getElementById('client-id').value.trim();
  const clientSecret = document.getElementById('client-secret').value.trim();
  if (!clientId || !clientSecret) {
    showError('Please enter both your Client ID and Client Secret.');
    return;
  }
  saveCredentials(clientId, clientSecret);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('xero_state', state);
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: clientId,
    redirect_uri: REDIRECT_URI,
    scope: 'openid profile email accounting.settings.read accounting.banktransactions.read accounting.reports.banksummary.read accounting.reports.balancesheet.read offline_access',
    state
  });
  window.location.href = 'https://login.xero.com/identity/connect/authorize?' + params;
}

async function exchangeCode(code) {
  const creds = getCredentials();
  if (!creds) throw new Error('Credentials not found. Please reconnect.');
  const basicAuth = btoa(creds.clientId + ':' + creds.clientSecret);
  const res = await fetch('https://xero-proxy.jj-026.workers.dev/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + basicAuth
    },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI
    })
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Token exchange failed: ' + err);
  }
  return res.json();
}

async function refreshToken(refreshTok) {
  const creds = getCredentials();
  if (!creds) throw new Error('No credentials stored.');
  const basicAuth = btoa(creds.clientId + ':' + creds.clientSecret);
  const res = await fetch('https://xero-proxy.jj-026.workers.dev/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + basicAuth
    },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: refreshTok
    })
  });
  if (!res.ok) throw new Error('Token refresh failed');
  return res.json();
}

function saveTokens(tokens) {
  const expiry = Date.now() + tokens.expires_in * 1000;
  sessionStorage.setItem('xero_tokens', JSON.stringify({ ...tokens, expiry }));
}

function getTokens() {
  try { return JSON.parse(sessionStorage.getItem('xero_tokens')); } catch { return null; }
}

async function getValidAccessToken() {
  let tokens = getTokens();
  if (!tokens) throw new Error('Not authenticated');
  if (Date.now() > tokens.expiry - 60000) {
    const refreshed = await refreshToken(tokens.refresh_token);
    saveTokens(refreshed);
    tokens = refreshed;
  }
  return tokens.access_token;
}

async function getTenants(accessToken) {
  const res = await fetch('https://xero-proxy.jj-026.workers.dev/connections', {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }
  });
  if (!res.ok) throw new Error('Failed to fetch tenants');
  return res.json();
}

async function getBankAccounts(accessToken, tenantId) {
  const res = await fetch('https://xero-proxy.jj-026.workers.dev/xero/Accounts?where=Type%3D%3D%22BANK%22&Status%3D%3D%22ACTIVE%22', {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'xero-tenant-id': tenantId, 'Accept': 'application/json' }
  });
  if (!res.ok) throw new Error('Failed to fetch accounts for tenant ' + tenantId);
  const data = await res.json();
  return data.Accounts || [];
}

async function getBalanceSheet(accessToken, tenantId) {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(`https://xero-proxy.jj-026.workers.dev/xero/Reports/BalanceSheet?date=${today}&payments=true`, {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'xero-tenant-id': tenantId, 'Accept': 'application/json' }
  });
  if (!res.ok) throw new Error('Failed to fetch balance sheet');
  return res.json();
}

async function getBankStatementBalances(accessToken, tenantId) {
  // Step 1: get all bank accounts
  const acctRes = await fetch('https://xero-proxy.jj-026.workers.dev/xero/Accounts?where=Type%3D%3D%22BANK%22', {
    headers: { 'Authorization': 'Bearer ' + accessToken, 'xero-tenant-id': tenantId, 'Accept': 'application/json' }
  });
  if (!acctRes.ok) throw new Error('Failed to fetch accounts');
  const acctData = await acctRes.json();
  const accounts = acctData.Accounts || [];

  const results = [];
  for (const acct of accounts) {
    try {
      // Step 2: get Bank Reconciliation Summary report for each account
      // This returns "Statement balance (calculated)" which matches Xero's Business Overview
      const rptRes = await fetch(`https://xero-proxy.jj-026.workers.dev/xero/Reports/BankReconciliationSummary?accountID=${acct.AccountID}`, {
        headers: { 'Authorization': 'Bearer ' + accessToken, 'xero-tenant-id': tenantId, 'Accept': 'application/json' }
      });

      if (!rptRes.ok) {
        results.push({ name: acct.Name, currency: acct.CurrencyCode || 'GBP', balance: 0 });
        continue;
      }

      const rptData = await rptRes.json();
      const report = rptData.Reports?.[0];
      let statementBalance = 0;

      // Walk all rows to find "Statement balance (calculated)"
      function findBalance(rows) {
        for (const row of rows || []) {
          const cells = row.Cells || [];
          const label = cells[0]?.Value || '';
          if (label.toLowerCase().includes('statement balance (calculated)')) {
            const raw = String(cells[1]?.Value || cells[2]?.Value || '0');
            const negative = raw.includes('(');
            const cleaned = raw.replace(/[^0-9.]/g, '');
            statementBalance = negative ? -parseFloat(cleaned) : parseFloat(cleaned);
            return true;
          }
          if (row.Rows && findBalance(row.Rows)) return true;
        }
        return false;
      }
      findBalance(report?.Rows);

      results.push({ name: acct.Name, currency: acct.CurrencyCode || 'GBP', balance: statementBalance });
    } catch(e) {
      results.push({ name: acct.Name, currency: acct.CurrencyCode || 'GBP', balance: 0 });
    }
  }
  return results;
}

const ORG_NAMES = [
  'Enterprise4All (North West) Limited',
  'Stand & Deliver Limited',
  'Safe Space Talent Limited'
];

function matchOrg(tenantName) {
  const aliases = {
    'enterprise4all': 'Enterprise4All (North West) Limited',
    'enterprise 4 all': 'Enterprise4All (North West) Limited',
    'stand & deliver': 'Stand & Deliver Limited',
    'stand and deliver': 'Stand & Deliver Limited',
    'safe space talent': 'Safe Space Talent Limited',
    'safe space': 'Safe Space Talent Limited'
  };
  const key = tenantName.toLowerCase();
  for (const [alias, full] of Object.entries(aliases)) {
    if (key.includes(alias)) return full;
  }
  return tenantName;
}

function renderOrgCard(orgName, accounts, loading) {
  const total = accounts.reduce((s, a) => s + (a.balance || 0), 0);
  const negClass = total < 0 ? ' negative' : '';

  let accountsHtml = '';
  if (loading) {
    accountsHtml = `<div class="loading-row"><div class="spinner"></div>Fetching balances…</div>`;
  } else if (!accounts.length) {
    accountsHtml = `<div class="loading-row" style="color:#888780">No bank accounts found</div>`;
  } else {
    for (const a of accounts) {
      const negAmt = a.balance < 0 ? ' negative' : '';
      accountsHtml += `
        <div class="account-row">
          <span class="account-name">${a.name}</span>
          <span class="account-balance${negAmt}">${fmt(a.balance, a.currency)}</span>
        </div>`;
    }
  }

  return `
    <div class="org-card" id="org-${orgName.replace(/\W/g,'_')}">
      <div class="org-header">
        <div class="org-name" title="${orgName}">${orgName}</div>
        <div class="org-total${negClass}">${loading ? '—' : fmt(total, accounts[0]?.currency || 'GBP')}</div>
      </div>
      <div class="accounts-list">${accountsHtml}</div>
    </div>`;
}

async function loadBalances() {
  document.getElementById('dashboard-screen').style.display = 'block';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('callback-screen').style.display = 'none';

  const grid = document.getElementById('orgs-grid');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  grid.innerHTML = ORG_NAMES.map(n => renderOrgCard(n, [], true)).join('');
  document.getElementById('grand-total').textContent = '—';
  document.getElementById('entity-count').textContent = 'Loading all entities…';

  try {
    const accessToken = await getValidAccessToken();
    const tenants = await getTenants(accessToken);

    const orgData = {};
    let grandTotal = 0;

    for (const tenant of tenants) {
      const displayName = matchOrg(tenant.tenantName);
      try {
        const accounts = await getBankStatementBalances(accessToken, tenant.tenantId);
        orgData[displayName] = accounts;
        accounts.forEach(a => grandTotal += a.balance || 0);
      } catch (e) {
        orgData[displayName] = [];
      }
    }

    for (const name of ORG_NAMES) {
      if (!orgData[name]) orgData[name] = [];
    }

    grid.innerHTML = ORG_NAMES.map(name => renderOrgCard(name, orgData[name] || [], false)).join('');

    const allAccounts = Object.values(orgData).flat();
    document.getElementById('grand-total').textContent = fmt(grandTotal, 'GBP');
    document.getElementById('entity-count').textContent =
      `Across ${tenants.length} connected entit${tenants.length === 1 ? 'y' : 'ies'} · ${allAccounts.length} bank account${allAccounts.length !== 1 ? 's' : ''}`;

    const now = new Date();
    document.getElementById('last-updated').textContent = 'Updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    statusDot.className = 'status-dot';
    statusText.textContent = 'Live data';

  } catch (e) {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Error loading data';
    document.getElementById('entity-count').textContent = e.message;
    console.error(e);
  }
}

function signOut() {
  sessionStorage.clear();
  window.location.href = REDIRECT_URI;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const savedState = sessionStorage.getItem('xero_state');

  if (!code) return false;

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('callback-screen').style.display = 'flex';

  if (state !== savedState) {
    document.getElementById('callback-msg').textContent = 'Security error: state mismatch. Please try again.';
    return true;
  }

  try {
    document.getElementById('callback-msg').textContent = 'Exchanging token with Xero…';
    const tokens = await exchangeCode(code);
    saveTokens(tokens);
    window.history.replaceState({}, '', REDIRECT_URI);
    document.getElementById('callback-msg').textContent = 'Loading your balances…';
    await loadBalances();
  } catch (e) {
    document.getElementById('callback-msg').textContent = 'Error: ' + e.message;
  }
  return true;
}

async function init() {
  const isCallback = await handleCallback();
  if (isCallback) return;

  const tokens = getTokens();
  if (tokens) {
    await loadBalances();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

init();
</script>
</body>
</html>
